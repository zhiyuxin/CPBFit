version: "3.8"

services:
  app:
    build: .
    container_name: weight-track
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化 SQLite 数据库
      - weight-data:/app/prisma
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:./prisma/dev.db
      # 生产环境务必替换为安全的随机字符串
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-secure-random-string}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # AI 功能（可选）
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}

volumes:
  weight-data:
