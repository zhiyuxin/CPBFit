name: WeightTrack Deploy
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 构建项目
        run: npm run build

      - name: 部署到服务器
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || '22' }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "=== 开始部署 WeightTrack ==="

            # 检查 Node.js 版本
            NODE_V=$(node -v | cut -d'.' -f1 | tr -d 'v')
            if [ "$NODE_V" -lt 20 ]; then
              echo "升级 Node.js 到 v20..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt install -y nodejs
            fi

            # 进入项目目录
            cd /var/www/weight-track || {
              echo "目录不存在，首次部署..."
              git clone https://gitee.com/luodm/cpbfit.git /var/www/weight-track
              cd /var/www/weight-track
            }

            # 拉取最新代码
            git pull origin master

            # 安装依赖
            npm install

            # 数据库
            npx prisma generate
            npx prisma db push
            npx tsx prisma/seed.ts

            # 构建
            npm run build

            # 配置 .env（如果不存在）
            if [ ! -f .env ]; then
              cat > .env << EOFF
      DATABASE_URL="file:./prisma/dev.db"
      NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
      NEXTAUTH_URL="http://localhost:3000"
      DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
      EOFF
              echo ".env 文件已创建"
            fi

            # 启动/重启应用
            if command -v pm2 &>/dev/null; then
              pm2 delete weight-track 2>/dev/null || true
              pm2 start npm --name "weight-track" -- start
              pm2 save
            else
              npm install -g pm2
              pm2 start npm --name "weight-track" -- start
              pm2 save
              pm2 startup systemd -u root --hp /root 2>/dev/null || true
            fi

            # 配置 Nginx（如果不存在）
            if [ ! -f /etc/nginx/sites-available/weight-track ]; then
              apt install -y nginx
              cat > /etc/nginx/sites-available/weight-track << NEOF
      server {
          listen 80;
          server_name _;
          client_max_body_size 10m;
          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header Upgrade \$http_upgrade;
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto \$scheme;
              proxy_cache_bypass \$http_upgrade;
              proxy_buffering off;
              proxy_cache off;
          }
      }
      NEOF
              ln -sf /etc/nginx/sites-available/weight-track /etc/nginx/sites-enabled/
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx
              echo "Nginx 配置完成"
            fi

            echo "=== 部署完成 ==="
